<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高级算法 期末复习资料</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
MathJax = {
  tex: {
    inlineMath: [['$', '$'], ['\\(', '\\)']],
    displayMath: [['$$', '$$'], ['\\[', '\\]']],
    processEscapes: true
  },
  options: {
    ignoreHtmlClass: 'tex2jax_ignore',
    processHtmlClass: 'tex2jax_process'
  }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" id="MathJax-script" async></script>
<style>
  html { scroll-behavior: smooth; }
  body {
    font-family: -apple-system, "微软雅黑", "PingFang SC", "Noto Sans CJK SC", sans-serif;
    max-width: 920px;
    margin: 0 auto;
    padding: 30px 25px;
    line-height: 1.8;
    color: #1a1a1a;
    font-size: 15px;
  }
  h2:target, h3:target { background: #fff8e1; transition: background 1s; }
  h1 { text-align: center; font-size: 26px; margin: 30px 0 10px; }
  h2 { border-bottom: 2px solid #4a90d9; padding-bottom: 8px; margin-top: 35px; color: #1a3a6e; font-size: 20px; }
  h3 { color: #2a5a9e; margin-top: 25px; font-size: 17px; }
  h4 { color: #2a5a9e; margin-top: 18px; font-size: 15px; }
  table { border-collapse: collapse; margin: 15px auto; width: auto; min-width: 50%; }
  td, th { border: 1px solid #bbb; padding: 6px 12px; text-align: center; }
  th { background: #e8f0fe; font-weight: bold; }
  li { margin: 2px 0; }
  blockquote {
    border-left: 4px solid #4a90d9;
    padding: 8px 15px;
    margin: 15px 0;
    background: #f8f9fa;
    color: #555;
  }
  hr { border: none; border-top: 1px solid #ddd; margin: 25px 0; }
  img { max-width: 100%; margin: 8px 0; border-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  pre { background: #f5f5f5; padding: 12px; border-radius: 4px; overflow-x: auto; font-size: 13px; }
  code { font-family: "SF Mono", "Fira Code", Consolas, monospace; background: #f0f0f0; padding: 1px 4px; border-radius: 3px; }
  pre code { background: none; padding: 0; }
  a { color: #2a5a9e; text-decoration: none; }
  a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div id="content" class="tex2jax_process"></div>
<script>
// Custom heading renderer: generate IDs matching TOC links (#ch1 ~ #ch14)
const chMap = {
  '一': 1, '二': 2, '三': 3, '四': 4, '五': 5,
  '六': 6, '七': 7, '八': 8, '九': 9, '十': 10,
  '十一': 11, '十二': 12, '十三': 13, '十四': 14
};
marked.use({
  renderer: {
    heading({ depth, text, raw }) {
      const m = raw.match(/^#{2,3}\s+([一二三四五六七八九十]+)、/);
      if (m && chMap[m[1]]) {
        return `<h${depth} id="ch${chMap[m[1]]}">${text}</h${depth}>`;
      }
      // Non-chapter headings (目录, 复习优先级速览, subsections, etc.)
      const id = text.replace(/<[^>]*>/g, '').toLowerCase()
        .replace(/[^a-zA-Z0-9一-鿿]+/g, '-')
        .replace(/^-|-$/g, '');
      return `<h${depth} id="${id}">${text}</h${depth}>`;
    }
  }
});

fetch('高级算法期末复习资料.md')
  .then(response => response.text())
  .then(md => {
    // Protect math from marked.js: $$→\[ \] and $→\( \)
    // Prevents _ inside $...$ from being mangled into <em> by marked
    md = md.replace(/\$\$([\s\S]*?)\$\$/g, '\\[$1\\]');
    md = md.replace(/(?<!\$)\$(?!\$)(.+?)(?<!\$)\$(?!\$)/g, '\\($1\\)');

    document.getElementById('content').innerHTML = marked.parse(md, {
      breaks: false,
      gfm: true
    });
    MathJax.typesetPromise && MathJax.typesetPromise();
  })
  .catch(err => {
    document.getElementById('content').innerHTML = '<p>加载失败，请刷新页面重试。</p>';
  });
</script>
</body>
</html>
